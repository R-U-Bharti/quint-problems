<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Water Tank Problem</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
    }

    .glass {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
  </style>

</head>

<body class="min-h-screen flex items-center justify-center text-white">

  <a class="glass py-2 rounded-lg hover:bg-blue-500/70 px-4 fixed bottom-2 right-2" href="./maxProfit.html">Max Profit
    Problem</a>

  <div class="flex flex-col w-full max-w-2xl">

    <h1 class="text-2xl font-bold mb-6 text-center">
      Water Tank Problem
    </h1>

    <div class="flex gap-3 justify-center">

      <input id="input"
        class="px-3 py-2 rounded bg-white/10 border border-white/20 w-[350px] focus:outline-none focus:ring-2 focus:ring-blue-500"
        type="text" placeholder="0,4,0,0,0,6,0,6,4,0" />

      <button onclick="solve()" class="bg-blue-500 hover:bg-blue-600 px-5 py-2 rounded">
        Calculate
      </button>

    </div>

    <h2 id="result" class="text-center mt-6 text-lg"></h2>

    <div id="chart" class="flex justify-center items-end gap-1 mt-10 h-64"></div>

  </div>


  <script>

    function solve() {
      let chart = document.getElementById("chart")
      chart.innerHTML = ""

      const arr = document.getElementById("input").value.split(",").map(Number);
      const n = arr.length;

      let totalWater = 0;
      let leftMax = [arr[0]];
      let rightMax = [];

      for (let i = 0; i < n; i++) {
        leftMax[i] = Math.max(leftMax[i - 1] || 0, arr[i]);
      }

      rightMax[n - 1] = arr[n - 1];
      for (let i = n - 2; i >= 0; i--) {
        rightMax[i] = Math.max(rightMax[i + 1] || 0, arr[i]);
      }

      for (let i = 0; i < n; i++) {

        let columnWater = Math.min(leftMax[i], rightMax[i]) - arr[i]
        totalWater += columnWater

        const col = document.createElement("div")
        col.className = "flex flex-col-reverse"

        for (let j = 0; j < arr[i]; j++) {
          let block = document.createElement("div")
          block.className = "w-8 h-6 bg-yellow-400 border border-black/20"
          col.appendChild(block)
        }

        for (let j = 0; j < columnWater; j++) {
          let waterBlock = document.createElement("div")
          waterBlock.className = "w-8 h-6 bg-blue-500/80"
          col.appendChild(waterBlock)
        }

        chart.appendChild(col)

      }

      document.getElementById("result").innerText =
        "Water Stored: " + totalWater + " Units"

    }

  </script>

</body>

</html>
